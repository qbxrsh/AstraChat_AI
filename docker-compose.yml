services:
  # LLM Service (только LLM модели)
  llm-service:
    build:
      context: ./llm-svc
      dockerfile: Dockerfile
    ports:
      - "8002:8000"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    volumes:
      - ./models:/app/models:ro          # GGUF модели для LLM (исправлен путь монтирования)
      - ./llm-svc/config:/app/config:ro
    restart: unless-stopped
    networks:
      - astrachat-network

  # STT Service (WhisperX / Vosk)
  stt-service:
    build:
      context: ./SVC-SPEECH-RECG
      dockerfile: Dockerfile
    ports:
      - "8001:8000"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    volumes:
      - ./SVC-SPEECH-RECG/vosk_models:/app/models/vosk:ro
      - ./whisperx_models:/app/models/whisperx_models
      - ./SVC-SPEECH-RECG/config:/app/config:ro
    restart: unless-stopped
    networks:
      - astrachat-network

  # TTS Service (Silero)
  tts-service:
    build:
      context: ./SVC-SPEECH-SYNT
      dockerfile: Dockerfile
    ports:
      - "8005:8000"
    volumes:
      - ./silero_models:/app/models/silero:ro
      - ./SVC-SPEECH-SYNT/config:/app/config:ro
    restart: unless-stopped
    networks:
      - astrachat-network

  # OCR Service (Surya). Backend вызывает его по http://ocr-service:8000 (SVC_OCR_URL) для извлечения текста из изображений при загрузке документов.
  ocr-service:
    build:
      context: ./SVC-OCR
      dockerfile: Dockerfile
    ports:
      - "8004:8000"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    volumes:
      - ./SVC-OCR/config:/app/config:ro
      - ./surya_models:/app/models/surya
    environment:
      - DATALAB_CACHE_DIR=/app/models/surya
      - HF_HOME=/app/models/surya
      - HF_HUB_CACHE=/app/models/surya
      - TRANSFORMERS_CACHE=/app/models/surya
    restart: unless-stopped
    networks:
      - astrachat-network

  # Diarization Service
  diarization-service:
    build:
      context: ./SVC-SPEECH-DIAR
      dockerfile: Dockerfile
    ports:
      - "8003:8000"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    volumes:
      - ./diarize_models:/app/models/diarization:ro
      - ./SVC-SPEECH-DIAR/config:/app/config:ro
    environment:
      - CONFIG_PATH=/app/config/config.yml
    restart: unless-stopped
    networks:
      - astrachat-network

  # Backend - FastAPI (теперь зависит от llm-svc, MongoDB и PostgreSQL)
  astrachat-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./memory:/app/memory
      - ./uploads:/app/uploads  # Директория для загруженных документов
      - ./backend:/app  # Полное монтирование для работы импортов
      - ./models:/app/models:ro  # Монтирование локальных моделей (эмбеддинги и др.)
    environment:
      - PYTHONPATH=/app
      # Старые переменные (для обратной совместимости)
      - LLM_SERVICE_URL=${LLM_SVC_INTERNAL_URL:-http://llm-service:8000}
      - USE_LLM_SVC=${USE_LLM_SVC:-true}
      # Новые адреса микросервисов (используются backend/config/config.py и backend/llm_client.py)
      - SVC_LLM_URL=http://llm-service:8000
      - SVC_STT_URL=http://stt-service:8000
      - SVC_TTS_URL=http://tts-service:8000
      - SVC_OCR_URL=http://ocr-service:8000
      - SVC_DIARIZATION_URL=http://diarization-service:8000
      - DOCKER_ENV=${DOCKER_ENV:-true}
      - CONFIG_PATH=${CONFIG_PATH}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - DEBUG=${DEBUG:-false}
      # MongoDB настройки
      - MONGODB_HOST=${MONGODB_HOST:-mongodb}
      - MONGODB_PORT=${MONGODB_PORT:-27017}
      - MONGODB_DATABASE=${MONGODB_DATABASE:-astrachat}
      - MONGODB_USER=${MONGODB_USER:-admin}
      - MONGODB_PASSWORD=${MONGODB_PASSWORD:-password}
      # PostgreSQL настройки
      - POSTGRES_HOST=${POSTGRES_HOST:-postgresql}
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
      - POSTGRES_DB=${POSTGRES_DB:-astrachat}
      - POSTGRES_USER=${POSTGRES_USER:-admin}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-password}
      # MinIO настройки
      - MINIO_ENDPOINT=${MINIO_ENDPOINT:-minio}
      - MINIO_PORT=${MINIO_PORT:-9000}
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD:-minioadmin}
      - MINIO_USE_SSL=${MINIO_USE_SSL:-false}
      - MINIO_BUCKET_NAME=${MINIO_BUCKET_NAME:-astrachat-temp}
      - MINIO_DOCUMENTS_BUCKET_NAME=${MINIO_DOCUMENTS_BUCKET_NAME:-astrachat-documents}
      - MINIO_MEMORY_RAG_BUCKET_NAME=${MINIO_MEMORY_RAG_BUCKET_NAME:-astrachat-memory-rag}
      # RAG (SVC-RAG) URL для backend/rag_client.py
      - SVC_RAG_URL=http://svc-rag:8000/v1
    depends_on:
      llm-service:
        condition: service_started
      stt-service:
        condition: service_started
      tts-service:
        condition: service_started
      ocr-service:
        condition: service_started
      diarization-service:
        condition: service_started
      mongodb:
        condition: service_healthy
      postgresql:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - astrachat-network

  # RAG Models Service (эмбеддинги + реранкер для SVC-RAG)
  rag-models:
    build:
      context: ./SVC-RAG-MODELS
      dockerfile: Dockerfile
    container_name: astrachat-rag-models
    ports:
      - "8010:8000"
    volumes:
      - ./models:/app/models:ro        # models/rag/* внутри контейнера
      - ./SVC-RAG-MODELS/config:/app/config:ro
    environment:
      - CONFIG_PATH=/app/config/config.yml
    restart: unless-stopped
    networks:
      - astrachat-network

  # RAG Logic Service (SVC-RAG) — парсинг, pgvector, BM25, иерархия
  svc-rag:
    build:
      context: ./SVC-RAG
      dockerfile: Dockerfile
    container_name: astrachat-svc-rag
    ports:
      - "8011:8000"
    volumes:
      - ./SVC-RAG/config:/app/config:ro
    environment:
      - CONFIG_PATH=/app/config/config.yml
      # URL сервиса моделей (RAG-MODELS)
      - RAG_MODELS_URL=http://rag-models:8000
      # PostgreSQL (общая БД с backend)
      - POSTGRES_HOST=${POSTGRES_HOST:-postgresql}
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
      - POSTGRES_DB=${POSTGRES_DB:-astrachat}
      - POSTGRES_USER=${POSTGRES_USER:-admin}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-password}
      - RAG_EMBEDDING_DIM=384
      # OCR и LLM сервисы (для OCR PDF/картинок и L2-суммаризации)
      - SVC_OCR_URL=http://ocr-service:8000
      - SVC_LLM_URL=http://llm-service:8000
    depends_on:
      rag-models:
        condition: service_started
      postgresql:
        condition: service_healthy
      ocr-service:
        condition: service_started
      llm-service:
        condition: service_started
    restart: unless-stopped
    networks:
      - astrachat-network

  # Frontend - React
  astrachat-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - REACT_APP_API_URL=http://localhost:8000
        - REACT_APP_WS_URL=ws://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      astrachat-backend:
        condition: service_started
    restart: unless-stopped
    networks:
      - astrachat-network

  # MongoDB - для хранения диалогов
  mongodb:
    image: mongo:7
    container_name: astrachat-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGODB_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGODB_PASSWORD:-password}
      MONGO_INITDB_DATABASE: ${MONGODB_DATABASE:-astrachat}
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 40s
    restart: unless-stopped
    networks:
      - astrachat-network

  # PostgreSQL + pgvector - для RAG системы
  postgresql:
    image: pgvector/pgvector:pg17
    container_name: astrachat-postgresql
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-astrachat}
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_INITDB_ARGS: "-E UTF8"
    volumes:
      - postgresql_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin} -d ${POSTGRES_DB:-astrachat}"]
      interval: 10s
      timeout: 10s
      retries: 20
      start_period: 30s
    restart: unless-stopped
    networks:
      - astrachat-network

  # MinIO - для хранения временных файлов (голосовые файлы, транскрибация)
  minio:
    image: minio/minio:latest
    container_name: astrachat-minio
    ports:
      - "9000:9000"  # API порт
      - "9001:9001"  # Console порт
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    restart: unless-stopped
    networks:
      - astrachat-network

  # Redis удален - не используется в проекте

  # Nginx для продакшена (опционально)
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - astrachat-backend
      - astrachat-frontend
    restart: unless-stopped
    networks:
      - astrachat-network
    profiles:
      - production

# volumes:
#   # Кэш для моделей (загружаемых из облака)
#   llm_models_cache:
#     driver: local

volumes:
  # Кэш для моделей (загружаемых из облака)
  llm_models_cache:
    driver: local
  # MongoDB данные
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local
  # PostgreSQL данные
  postgresql_data:
    driver: local
  # MinIO данные
  minio_data:
    driver: local

networks:
  astrachat-network:
    driver: bridge