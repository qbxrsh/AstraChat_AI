# --- ОСТАЛЬНЫЕ МОДУЛИ ОТКЛЮЧЕНЫ ---
model:
  path: "/dev/null"
  name: "disabled"
  ctx_size: 0
  gpu_layers: 0
  backend: "llama.cpp"

generation:
  default_temperature: 0.7
  default_max_tokens: 1
  stream: false

silero:
  enabled: false
  models_dir: "/dev/null"

whisperx:
  enabled: false
  models_dir: "/dev/null"

diarization:
  enabled: false
  models_dir: "/dev/null"
  config_path: "/dev/null"

nexus:
  enabled: false
security:
  enabled: false
monitoring:
  enabled: false
caching:
  enabled: false