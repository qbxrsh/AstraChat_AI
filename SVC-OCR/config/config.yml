# Конфигурация сервера
server:
  host: "0.0.0.0"
  port: 8000
  log_level: "INFO"
  docs_url: "/docs"
  redoc_url: "/redoc"

cors:
  allowed_origins: []
  allow_credentials: true
  allow_methods: ["*"]
  allow_headers: ["*"]

urls:
  frontend_port_1: "http://localhost:3000"
  frontend_port_1_ipv4: "http://127.0.0.1:3000"
  frontend_port_2: "http://localhost:3001"
  frontend_port_2_ipv4: "http://127.0.0.1:3001"
  frontend_port_3: "http://localhost:5173"
  frontend_port_3_ipv4: "http://127.0.0.1:5173"
  backend_port_1: "http://localhost:8000"
  backend_port_1_ipv4: "http://127.0.0.1:8000"
  backend_port_2: "http://localhost:8080"
  backend_port_2_ipv4: "http://127.0.0.1:8080"

# Настройки приложения
app:
  title: "astrachat OCR Service"
  description: "Microservice for Surya OCR (Optical Character Recognition)"
  version: "1.0.0"

# --- SURYA OCR (Распознавание текста) ---
# Настройки взяты из твоего оригинала
surya:
  enabled: true
  models_dir: "/app/models/surya"  # Каталог с моделями (внутри: text_detection/..., text_recognition/...)
  # Для офлайн-режима укажи локальные чекпоинты (подпапки внутри models_dir):
  # detection_checkpoint: "text_detection/2025_02_28"
  # recognition_checkpoint: "text_recognition/2025_02_18"
  # offline: true  # Не качать модели из интернета
  device: "auto"  # auto, cpu, cuda
  max_file_size: 52428800  # 50MB
  supported_languages:
    - "ru"
    - "en"
    - "hi"
    - "es"
    - "fr"
