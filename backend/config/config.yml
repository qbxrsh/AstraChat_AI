# Конфигурация astrachat Backend
# Теперь каждая модель вынесена в отдельный изолированный микросервис

# Основные настройки приложения
app:
  name: "astrachat Backend"
  version: "1.0.0"
  description: "Backend service with distributed AI microservices"
  debug: false

# Настройки сервера
server:
  host: "0.0.0.0"
  port: 8000
  log_level: "INFO"
  workers: 1

# Настройки CORS
cors:
  allowed_origins: 
    - "http://localhost:3000"
    - "http://127.0.0.1:3000"
  allow_credentials: true
  allow_methods: ["*"]
  allow_headers: ["*"]

# ========================================================
# НАСТРОЙКИ МИКРОСЕРВИСОВ (ML Services)
# ========================================================
microservices:
  # 1. Сервис генерации текста (LLM)
  llm:
    enabled: true
    url: "http://llm-service:8000"
    timeout: 300
    models:
      default: "qvikhr-2.5b"
      fallback: "qwen-coder-30b"

  # 2. Сервис распознавания речи (STT)
  stt:
    enabled: true
    url: "http://stt-service:8000"
    timeout: 900
    vosk:
      enabled: true
    whisperx:
      enabled: true
      compute_type: "int8"

  # 3. Сервис синтеза речи (TTS)
  tts:
    enabled: true
    url: "http://tts-service:8000"
    timeout: 300

  # 4. Сервис диаризации (Diarization)
  diarization:
    enabled: true
    url: "http://diarization-service:8000"
    timeout: 3600

  # 5. Сервис распознавания текста (OCR)
  ocr:
    enabled: true
    url: "http://ocr-service:8000"
    timeout: 300

# ========================================================
# ПАМЯТЬ И БАЗЫ ДАННЫХ
# ========================================================
memory:
  enabled: true
  storage_type: "file"
  file_path: "/app/memory"
  max_history_length: 100

mongodb:
  host: "mongodb"
  port: 27017
  database: "memoai"

postgresql:
  host: "postgresql"
  port: 5432
  database: "astrachat"
  user: "admin"
  password: "password"
  embedding_dim: 384

minio:
  endpoint: "minio"
  port: 9000
  access_key: "minioadmin"
  secret_key: "minioadmin"
  use_ssl: false
  bucket_name: "memoai-temp"
  documents_bucket_name: "astrachat-documents"

# ========================================================
# ПУТИ И СИСТЕМНЫЕ НАСТРОЙКИ
# ========================================================
paths:
  # В режиме микросервисов эти пути на бэкенде могут быть пустыми, 
  # так как модели лежат в своих контейнерах.
  whisperx_models_dir: "whisperx_models"
  diarize_models_dir: "diarize_models"
  model_path: "models"
  memory_path: "memory"

logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file: "/app/logs/backend.log"
  max_size: 10485760
  backup_count: 5

# ========================================================
# СЕТЕВЫЕ АДРЕСА (Service Discovery)
# ========================================================
urls:
  # Docker внутренние адреса (используются для общения между контейнерами)
  llm_service_docker: "http://llm-service:8000"
  stt_service_docker: "http://stt-service:8000"
  tts_service_docker: "http://tts-service:8000"
  ocr_service_docker: "http://ocr-service:8000"
  diarization_docker: "http://diarization-service:8000"
  
  # Внешние адреса для отладки
  backend_port_1: "http://localhost:8000"
  frontend_port_1: "http://localhost:3000"
  frontend_port_1_ipv4: "http://127.0.0.1:3000"