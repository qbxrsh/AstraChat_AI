# Конфигурация astrachat Backend
# Теперь каждая модель вынесена в отдельный изолированный микросервис
#
# Сетевые URL задаются только в секции urls: ниже. Поля microservices.*.url не используются
# (удалены); таймауты и прочие параметры — в microservices.

# Основные настройки приложения
app:
  name: "astrachat Backend"
  version: "1.0.0"
  description: "Backend service with distributed AI microservices"
  debug: false

# Настройки сервера
server:
  host: "0.0.0.0"
  port: 8000
  log_level: "INFO"
  workers: 1

# CORS: пустой список — origins берутся из urls (frontend_*, backend_*)
cors:
  allowed_origins: []
  allow_credentials: true
  allow_methods: ["*"]
  allow_headers: ["*"]

# ========================================================
# НАСТРОЙКИ МИКРОСЕРВИСОВ (ML Services)
# ========================================================
microservices:
  llm:
    enabled: true
    timeout: 300
    default_host_id: "local"
    hosts:
      - id: local
        # base_url подставляется из urls.llm_service_docker / llm_service_port при загрузке, если пусто
        base_url: ""
    models:
      default: "qwen2.5-7b-instruct-q3_k_m"
      fallback: "qwen-coder-30b"

  stt:
    enabled: true
    timeout: 900
    whisperx:
      enabled: true
      compute_type: "int8"

  tts:
    enabled: true
    timeout: 300

  diarization:
    enabled: true
    timeout: 3600

  ocr:
    enabled: true
    timeout: 300

# ========================================================
# ПАМЯТЬ И БАЗЫ ДАННЫХ
# ========================================================
memory:
  enabled: true
  storage_type: "file"
  file_path: "/app/memory"
  max_history_length: 100

mongodb:
  host: "mongodb"
  port: 27017
  database: "memoai"

postgresql:
  host: "postgresql"
  port: 5432
  database: "astrachat"
  user: "admin"
  password: "password"
  embedding_dim: 384

minio:
  endpoint: "minio"
  port: 9000
  access_key: "minioadmin"
  secret_key: "minioadmin"
  use_ssl: false
  bucket_name: "memoai-temp"
  documents_bucket_name: "astrachat-documents"

# ========================================================
# ПУТИ И СИСТЕМНЫЕ НАСТРОЙКИ
# ========================================================
paths:
  whisperx_models_dir: "whisperx_models"
  diarize_models_dir: "diarize_models"
  model_path: "models"
  memory_path: "memory"

logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file: "/app/logs/backend.log"
  max_size: 10485760
  backup_count: 5

# ========================================================
# СЕТЕВЫЕ АДРЕСА — единственный источник URL для сервисов
# (переменные окружения с теми же смыслами перекрывают значения из YAML)
# ========================================================
urls:
  frontend_port_1: "http://localhost:3000"
  frontend_port_1_ipv4: "http://127.0.0.1:3000"
  frontend_port_2: "http://localhost:3001"
  frontend_port_2_ipv4: "http://127.0.0.1:3001"
  frontend_port_3: "http://localhost:5173"
  frontend_port_3_ipv4: "http://127.0.0.1:5173"

  backend_port_1: "http://localhost:8000"
  backend_port_1_ipv4: "http://127.0.0.1:8000"
  backend_port_2: "http://localhost:8080"
  backend_port_2_ipv4: "http://127.0.0.1:8080"

  frontend_docker: "http://astrachat-frontend:3000"
  backend_docker: "http://astrachat-backend:8000"

  llm_service_port: "http://localhost:8002"
  llm_service_docker: "http://llm-service:8000"

  stt_service_port: "http://localhost:8001"
  stt_service_docker: "http://stt-service:8000"

  tts_service_port: "http://localhost:8005"
  tts_service_docker: "http://tts-service:8000"

  ocr_service_port: "http://localhost:8004"
  ocr_service_docker: "http://ocr-service:8000"

  diarization_service_port: "http://localhost:8003"
  diarization_service_docker: "http://diarization-service:8000"

  rag_service_port: "http://localhost:8011"
  rag_service_docker: "http://svc-rag:8000"

  rag_models_service_port: "http://localhost:8010"
  rag_models_service_docker: "http://rag-models:8000"
