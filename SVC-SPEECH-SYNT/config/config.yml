# Конфигурация сервера
server:
  host: "0.0.0.0"
  port: 8000
  log_level: "INFO"
  docs_url: "/docs"
  redoc_url: "/redoc"

# Настройки CORS
cors:
  allowed_origins:
    - "*"
  allow_credentials: true
  allow_methods: ["*"]
  allow_headers: ["*"]

# Настройки приложения
app:
  title: "astrachat TTS Service"
  description: "Microservice for Silero Text-to-Speech"
  version: "1.0.0"

# Настройки логирования
logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  max_size: 10485760
  backup_count: 5

# --- SILERO (СИНТЕЗ РЕЧИ) ---
silero:
  enabled: true
  models_dir: "/app/models/silero"  # Путь внутри контейнера
  sample_rate: 48000
  max_text_length: 5000
  supported_languages:
    - "ru"
    - "en"
  supported_speakers:
    ru:
      - "baya"
      - "kseniya"
      - "xenia"
      - "eugene"
      - "aidar"
    en:
      - "v3_en"

# --- ОСТАЛЬНЫЕ МОДУЛИ ОТКЛЮЧЕНЫ ---
# Эти секции обязаны быть в файле, чтобы Pydantic-модель из app/core/config.py 
# прошла валидацию при загрузке

model:
  path: "/dev/null"
  name: "disabled"
  ctx_size: 0
  gpu_layers: 0
  backend: "llama.cpp"

generation:
  default_temperature: 0.7
  default_max_tokens: 1
  stream: false

vosk:
  enabled: false
  model_path: "/dev/null"

whisperx:
  enabled: false
  models_dir: "/dev/null"

diarization:
  enabled: false
  models_dir: "/dev/null"
  config_path: "/dev/null"

surya:
  enabled: false
  models_dir: "/dev/null"

nexus:
  enabled: false

monitoring:
  enabled: false

caching:
  enabled: false

security:
  enabled: false