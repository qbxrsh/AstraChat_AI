# Конфигурация llm-svc для интеграции с astrachat
# ВАЖНО: Обновите путь к модели в разделе model.path

# Конфигурация сервера
server:
  host: "0.0.0.0"
  port: 8000  # Внутри контейнера используем порт 8000, пробрасывается как 8001:8000
  log_level: "INFO"
  docs_url: "/docs"
  redoc_url: "/redoc"

# CORS: при пустом allowed_origins список строится из urls (как на backend)
cors:
  allowed_origins: []
  allow_credentials: true
  allow_methods: ["*"]
  allow_headers: ["*"]

urls:
  frontend_port_1: "http://localhost:3000"
  frontend_port_1_ipv4: "http://127.0.0.1:3000"
  frontend_port_2: "http://localhost:3001"
  frontend_port_2_ipv4: "http://127.0.0.1:3001"
  frontend_port_3: "http://localhost:5173"
  frontend_port_3_ipv4: "http://127.0.0.1:5173"
  backend_port_1: "http://localhost:8000"
  backend_port_1_ipv4: "http://127.0.0.1:8000"
  backend_port_2: "http://localhost:8080"
  backend_port_2_ipv4: "http://127.0.0.1:8080"
  frontend_docker: "http://astrachat-frontend:3000"
  backend_docker: "http://astrachat-backend:8000"
  llm_service_port: "http://localhost:8002"
  llm_service_docker: "http://llm-service:8000"

# Настройки модели LLM
# ВАЖНО: Обновите путь к вашей модели!
model:
  # Локальная модель (путь в контейнере)
  # Для GGUF моделей (llama.cpp):
  # path: "/app/models/llm/Qwen3-Coder-30B-A3B-Instruct-Q8_0.gguf"
  # path: "/app/models/llm/Qwen3.5-9B-UD-Q8_K_XL.gguf"
  path: "/app/models/llm/qwen2.5-7b-instruct-q3_k_m.gguf"
  # Для HuggingFace моделей (vLLM) - указывайте путь к папке с моделью:
  # Альтернатива: Qwen3-VL поддерживается vLLM
  # path: "/app/models/llm/Qwen3-Omni-30B-A3B-Instruct-AWQ-4bit"  
  # path: "/app/models/llm/Qwen3-VL-30B-A3B-Instruct-AWQ" 
  
  # Облачная модель (раскомментируйте и настройте при необходимости)
  # path: "s3://your-bucket/models/Qwen3-Coder-30B-A3B-Instruct-Q8_0.gguf"
  # path: "gs://your-bucket/models/Qwen3-Coder-30B-A3B-Instruct-Q8_0.gguf"
  # path: "https://your-server.com/models/Qwen3-Coder-30B-A3B-Instruct-Q8_0.gguf"
  
  # name: "qwen-coder-30b"
  # Совпадает со stem файла path (иначе старт ищет несуществующий Qwen3.5-9B.gguf)
  name: "qwen2.5-7b-instruct-q3_k_m"
  ctx_size: 8192
  # gpu_layers: 0 = только CPU. Для моделей 30B+ на CPU нужно ~32 ГБ RAM, иначе загрузка может зависнуть.
  # Если есть NVIDIA GPU — укажите gpu_layers: -1 (все слои на GPU) для быстрой загрузки и работы.
  gpu_layers: -1  # -1 = все слои на GPU
  verbose: false
  # name: "qwen3-vl-30b-awq"  # Изменено на Qwen3-VL (поддерживается vLLM)
  # # Выбор бэкенда: "llama.cpp" или "vllm"
  # # llama.cpp - для GGUF моделей (квантованные модели)
  # # vllm - для оригинальных моделей HuggingFace (включая AWQ, GPTQ и другие форматы)
  backend: "llama.cpp"  # vllm или "llama.cpp"
  
  # ctx_size: 32768  # Размер контекста для модели (можно увеличить при необходимости)
  # gpu_layers: 0  # Установите -1 для использования всех слоев на GPU (только для llama.cpp)
  # verbose: false
  
  # Параметры для vLLM (используются только если backend: "vllm")
  tensor_parallel_size: 1  # Количество GPU для параллельной обработки
  gpu_memory_utilization: 0.9  # Использование памяти GPU (0.0 - 1.0)
  trust_remote_code: true  # Нужно для многих MoE/HF-моделей
  quantization: null  # "awq", "gptq", "fp8", "compressed-tensors" или null

# Настройки генерации
generation:
  default_temperature: 0.7
  default_max_tokens: 1024
  stream: true

# Настройки приложения
app:
  title: "astrachat AI Models Service"
  description: "LLM inference service"
  version: "1.0.0"

# Настройки мониторинга
monitoring:
  enabled: false
  prometheus_port: 9090
  metrics_path: "/metrics"

# Настройки логирования
logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file: null
  max_size: 10485760  # 10MB
  backup_count: 5

# Настройки кэширования
caching:
  enabled: true
  ttl: 300  # Время жизни кэша в секундах
  max_size: 1000  # Максимальное количество элементов в кэше

# Настройки безопасности
security:
  enabled: false  # Отключено для локальной разработки
  api_key: null
  api_key_header: "X-API-Key"

# Настройки Nexus (для загрузки моделей из репозитория)
nexus:
  enabled: false
  url: ""
  repo: ""
  name: ""
  id: ""
  version: ""
  file_name: ""
  login: null
  password: null
  cert_path: null