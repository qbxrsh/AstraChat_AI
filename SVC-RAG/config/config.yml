# SVC-RAG: логика RAG (парсинг, чанкинг, поиск). Модели — в SVC-RAG-MODELS.

server:
  host: "0.0.0.0"
  port: 8000
  log_level: "INFO"
  docs_url: "/docs"
  redoc_url: "/redoc"

cors:
  allowed_origins: []
  allow_credentials: true
  allow_methods: ["*"]
  allow_headers: ["*"]

urls:
  frontend_port_1: "http://localhost:3000"
  frontend_port_1_ipv4: "http://127.0.0.1:3000"
  frontend_port_2: "http://localhost:3001"
  frontend_port_2_ipv4: "http://127.0.0.1:3001"
  frontend_port_3: "http://localhost:5173"
  frontend_port_3_ipv4: "http://127.0.0.1:5173"
  backend_port_1: "http://localhost:8000"
  backend_port_1_ipv4: "http://127.0.0.1:8000"
  backend_port_2: "http://localhost:8080"
  backend_port_2_ipv4: "http://127.0.0.1:8080"
  frontend_docker: "http://astrachat-frontend:3000"
  backend_docker: "http://astrachat-backend:8000"
  llm_service_port: "http://localhost:8002"
  llm_service_docker: "http://llm-service:8000"
  ocr_service_port: "http://localhost:8004"
  ocr_service_docker: "http://ocr-service:8000"
  rag_models_service_port: "http://localhost:8010"
  rag_models_service_docker: "http://rag-models:8000"

app:
  title: "astrachat RAG Service"
  description: "Индексация документов и поиск (pgvector + BM25), эмбеддинги и реранкер через SVC-RAG-MODELS"
  version: "1.0.0"

logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"

# base_url берётся из urls.rag_models_service_* (см. выше)
rag_models_client:
  timeout: 60.0

# PostgreSQL с pgvector
postgresql:
  host: "postgresql"
  port: 5432
  database: "astrachat"
  user: "admin"
  password: "password"
  embedding_dim: 384

# Параметры поиска
rag:
  enabled: true

  # --- Гибридный поиск (BM25 + вектор, только global store) ---
  use_hybrid_search: true
  hybrid_bm25_weight: 0.35

  # --- Реранкинг (cross-encoder через SVC-RAG-MODELS) ---
  use_reranking: true
  rerank_top_k: 40
  # Минимальный скор после реранка (0 = не отсекать; формула: 0.7*CrossEncoder + 0.3*cosine).
  # Положительные значения могут выбросить все чанки — подбирайте осторожно.
  rerank_min_score: 0

  # --- Минимальное косинусное сходство до реранка ---
  # Отсекает явно нерелевантные чанки из pgvector до отправки в cross-encoder.
  # 0 = не фильтровать; 0.25 = агрессивная фильтрация (рекомендуется при k=5).
  min_vector_similarity: 0.25

  # --- Чанкинг ---
  chunk_size: 1000
  chunk_overlap: 250

  # --- Sentence window (расширение найденного чанка соседями) ---
  # 0 = выкл; 1 = чанк + по 1 соседу слева/справа.
  # При k=5 и overlap=250 чанки уже перекрываются — window не нужен, только раздувает контекст.
  sentence_window: 0

  # --- Иерархическое индексирование (только global store) ---
  # Включается для документов длиннее hierarchical_threshold символов.
  use_hierarchical_indexing: true
  hierarchical_threshold: 8000
  hierarchical_chunk_size: 1500
  hierarchical_chunk_overlap: 200
  intermediate_summary_chunks: 8
  # Суммаризировать документ через LLM при индексации (требует работающего llm-service).
  create_full_summary_via_llm: false

  # --- Graph RAG ---
  enable_graph_rag: true
