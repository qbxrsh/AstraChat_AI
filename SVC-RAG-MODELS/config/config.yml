# SVC-RAG-MODELS: Embedding and Reranker models

server:
  host: "0.0.0.0"
  port: 8000
  log_level: "INFO"
  docs_url: "/docs"
  redoc_url: "/redoc"

cors:
  allowed_origins: []
  allow_credentials: true
  allow_methods: ["*"]
  allow_headers: ["*"]

urls:
  frontend_port_1: "http://localhost:3000"
  frontend_port_1_ipv4: "http://127.0.0.1:3000"
  frontend_port_2: "http://localhost:3001"
  frontend_port_2_ipv4: "http://127.0.0.1:3001"
  frontend_port_3: "http://localhost:5173"
  frontend_port_3_ipv4: "http://127.0.0.1:5173"
  backend_port_1: "http://localhost:8000"
  backend_port_1_ipv4: "http://127.0.0.1:8000"
  backend_port_2: "http://localhost:8080"
  backend_port_2_ipv4: "http://127.0.0.1:8080"

app:
  title: "astrachat RAG Models Service"
  description: "Embedding (MiniLM-L12) and Reranker (MiniLM-L6) for RAG"
  version: "1.0.0"

logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"

# --- RAG MODELS (embedding + reranker) ---
# На хосте кладите модели в КОРЕНЬ ПРОЕКТА: models/rag/
# (рядом с models/ для LLM). В docker-compose: volumes: - ./models:/app/models
# Тогда в контейнере /app/models/rag = host models/rag/
# Структура: models/rag/paraphrase-multilingual-MiniLM-L12-v2/, models/rag/ms-marco-MiniLM-L-6-v2/
rag_models:
  enabled: true
  models_dir: "/app/models/rag"
  # Subfolder names under models_dir (same as Hugging Face snapshot folder names)
  # Если папки нет, сервис попытается скачать модель с Hugging Face в models_dir.
  embedding_model: "paraphrase-multilingual-MiniLM-L12-v2"
  reranker_model: "ms-marco-MiniLM-L-6-v2"
  offline: true   # только локальные модели, без запросов к HuggingFace
  device: "cpu"
